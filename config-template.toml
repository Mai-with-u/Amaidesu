# Amaidesu 配置文件模板
#
# 配置层次说明
# ================================
# 此配置文件是用户主配置，包含：
# 1. 全局配置（LLM、MaiCore连接等）
# 2. Collector/Decider/Handler启用列表和配置
# 3. Pipeline配置
#
# 配置说明：
# - Collector、Decider、Handler 和 Pipeline 的配置统一在本文件中管理
# - 配置路径：[collectors.xxx], [deciders.xxx], [handlers.xxx], [pipelines.xxx]
#
# 配置格式（v0.3.0+）:
# - [collectors] - 输入Collector配置
# - [collectors.xxx] - 具体Collector配置
# - [deciders] - 决策Decider配置
# - [deciders.xxx] - 具体Decider配置
# - [handlers] - 输出Handler配置
# - [handlers.xxx] - 具体Handler配置

[meta]
version = "0.3.0"  # 配置模板版本，用于自动更新检测

# ========== 全局LLM配置 ==========

# 标准 LLM 配置（用于高质量任务）
[llm]
client = "openai"              # openai（所有提供 OpenAI 兼容 API 的服务，如 Ollama、LM Studio、vLLM 等）
model = "gpt-4"
temperature = 0.2
api_key = "your-api-key"                    # 可选，如果不设置将使用环境变量
base_url = "https://api.openai.com/v1"      # 可选，用于自定义API端点
max_tokens = 1024
max_retries = 3                 # 可选，默认 3
retry_delay = 1.0               # 可选，默认 1.0

# 快速 LLM 配置（用于低延迟任务，如 Avatar 表情分析）
[llm_fast]
client = "openai"
model = "gpt-3.5-turbo"
temperature = 0.2
api_key = "your-api-key"
base_url = "https://api.openai.com/v1"
max_tokens = 1024

# 视觉语言模型配置（用于图像理解任务）
[vlm]
client = "openai"
model = "gpt-4-vision-preview"
temperature = 0.3
api_key = "your-api-key"
base_url = "https://api.openai.com/v1"
max_tokens = 1024

# 本地 Ollama 配置（可选）
# 注意：Ollama、LM Studio、vLLM 等都提供 OpenAI 兼容 API，使用 client = "openai" 并配置 base_url 即可
[llm_local]
client = "openai"
model = "llama3"
base_url = "http://localhost:11434/v1"  # Ollama 默认地址
api_key = "sk-dummy"  # Ollama 不需要真实 API key

# ========== Amaidesu核心配置 ==========

[general]
# Amaidesu 在 MaiCore 中注册的平台标识符
platform_id = "amaidesu"

# ========== VTuber 人设配置 ==========
# 此配置段用于定义 VTuber 的性格和说话风格
# 被 LocalLLMDecisionProvider 等使用 LLM 的 Provider 引用
[persona]
# VTuber 名字
bot_name = "麦麦"

# 性格描述（50字以内）
personality = "活泼开朗，有些调皮，喜欢和观众互动"

# 说话风格约束（指导 LLM 生成回复的风格）
style_constraints = "口语化，使用网络流行语，避免机械式回复，适当使用emoji"

# 用户称呼
user_name = "大家"

# 回复长度限制（字数）
max_response_length = 50

# 情感表达强度 (1-10, 1=平淡, 10=丰富)
emotion_intensity = 7

[maicore]
# MaiCore WebSocket 服务器地址
host = "127.0.0.1"
# MaiCore WebSocket 服务器端口
port = 8000
# token = "your_maicore_token_if_needed" # 如果 MaiCore 需要认证，取消注释并设置

# 讯飞 RTASR 实时识别凭据（可选）
[spark_rtasr]
app_id = ""
access_key_id = ""
access_key_secret = ""
# 可选：自定义 websocket URL（默认官方地址）
# ws_url = "wss://office-api-ast-dx.iflyaisol.com/ast/communicate/v1"

# HTTP回调服务器配置
[http_server]
enable = true
host = "127.0.0.1"
port = 8080
callback_path = "/maicore_callback"

# ========== 上下文管理器配置 ==========

[context]
# 上下文管理器配置
storage_type = "memory"  # 存储类型: memory 或 file
max_messages_per_session = 50  # 每个会话保留的最大消息数
max_sessions = 100  # 最大会话数
session_timeout_seconds = 3600  # 会话超时时间（秒）
enable_persistence = false  # 启用持久化（暂未实现）

# ========== 日志配置 ==========

[logging]
# 是否启用文件日志
enabled = true
# 日志格式: jsonl (JSON Lines) 或 text (纯文本)
format = "jsonl"
# 日志文件目录 (相对于项目根目录)
directory = "logs"
# 最小日志级别: TRACE | DEBUG | INFO | WARNING | ERROR | CRITICAL
level = "INFO"
# 文件轮转触发条件: "10 MB", "1 day", "00:00", "weekly", "monthly"
rotation = "10 MB"
# 日志保留时间: "7 days", "1 week", "1 month", "1 year"
retention = "7 days"
# 压缩格式: "zip", "gz", "tar", "" (禁用)
compression = "zip"
# 是否按会话分割日志文件（默认：false）
# 启用后，每次启动生成新文件（文件名包含时分秒，如 amaidesu_20260207_150423.jsonl）
# 禁用时，同一天多次启动会追加到同一文件（如 amaidesu_2026-02-07.jsonl）
split_by_session = false

# ============================================================
# Pipeline 配置
# ============================================================

# === 输入管道（InputPipeline）===
# InputPipeline 在 InputCollectorManager 中执行，用于过滤/处理输入消息

# 限流管道 - 限制消息发送频率
[pipelines.rate_limit]
priority = 100
enabled = true
global_rate_limit = 100  # 全局每分钟最大消息数
user_rate_limit = 10     # 每用户每分钟最大消息数
window_size = 60         # 滑动窗口大小（秒）

# 相似文本过滤管道 - 过滤重复消息
[pipelines.similar_filter]
priority = 500
enabled = true
similarity_threshold = 0.85  # 相似度阈值 (0.0-1.0)
time_window = 5.0            # 检查窗口时间范围（秒）
min_text_length = 3          # 最小处理文本长度
cross_user_filter = true     # 是否跨用户过滤相似消息

# === 输出管道（OutputPipeline）===
# OutputPipeline 在 OutputHandlerManager 中执行，用于过滤/处理输出内容

# 敏感词过滤管道 - 过滤输出中的敏感词
[pipelines.profanity_filter.output]
enabled = true
priority = 100
# 敏感词列表
words = ["测试脏话", "示例敏感词"]
replacement = "***"
# 可选：从文件加载
# wordlist_file = "data/profanity_words.txt"
# 是否过滤 TTS 文本（默认：true）
filter_tts = true
# 是否过滤字幕文本（默认：true）
filter_subtitle = true
# 是否区分大小写（默认：false）
case_sensitive = false
# 匹配到敏感词是否丢弃整个消息（默认：false）
drop_on_match = false

# ========== Collector配置（Input Domain） ==========

# === 输入Collector ===
[collectors]
enabled = [
    # 控制台输入（开发测试用）
    # "console_input",

    # B站弹幕输入
    # "bili_danmaku",           # 普通B站弹幕
    # "bili_danmaku_official",  # B站官方弹幕（不要和bili_danmaku同时启用）
    # "bili_danmaku_official_maicraft",  # B站官方弹幕（MaiCraft专用）

    # 语音输入
    # "stt",                     # 语音转文字（讯飞ASR + Silero VAD）

    # 其他输入
    # "mock_danmaku",           # 模拟弹幕
    # "read_pingmu",            # 读屏木
    # "mainosaba",              # Mainosaba读屏
]

# --- STT Collector (语音转文字) ---
[collectors.stt]
type = "stt"

[collectors.stt.iflytek_asr]
appid = "your_appid"
api_key = "your_api_key"
api_secret = "your_api_secret"
host = "iat-api.xfyun.cn"  # 语音听写流式版 API 地址
path = "/v2/iat"            # 语音听写流式版 API 路径

# VAD 配置（可选）
[collectors.stt.vad]
enable = true
vad_threshold = 0.5
silence_seconds = 1.0

# 音频配置（可选）
[collectors.stt.audio]
sample_rate = 16000
channels = 1
stt_input_device_name = ""  # 指定麦克风设备，留空使用默认

# 消息配置（可选）
[collectors.stt.message_config]
user_id = "stt_user"
user_nickname = "语音"

# ========== Decider配置（Decision Domain） ==========

# === 决策Decider ===
[deciders]
active = "maibot"  # 当前使用的决策Decider
available = [
    "maibot",     # MaiBot决策（默认，通过WebSocket连接MaiCore）
    "llm",        # LLM（直接调用LLM生成回复）
    "maicraft",   # MaiCraft弹幕游戏决策
    "replay",      # 输入重放（调试用，直接将输入传递到输出）
]

# --- MaiBot Decider ---
# [deciders.maibot]
# host = "127.0.0.1"
# port = 8000
# connect_timeout = 10.0
# reconnect_interval = 5.0

# --- LLM Decider ---
# [deciders.llm]
# fallback_mode = "simple"  # simple | echo | error

# --- Replay Decider (调试用) ---
# [deciders.replay]
# add_default_action = true  # 是否添加默认眨眼动作

# ========== Handler配置（Output Domain） ==========

# === 输出Handler ===
[handlers]
enabled = [
    # 基础输出（推荐启用）
    "subtitle",     # 字幕
    "vts",          # VTS控制

    # TTS输出（选择一个或多个）
    # "tts",         # Edge TTS
    # "omni_tts",    # Omni TTS (GPT-SoVITS)

    # 虚拟形象输出
    # "avatar",      # 虚拟形象输出（支持VTS/VRChat/Live2D）

    # OBS控制
    # "obs_control", # OBS控制（文本显示、场景切换）

    # 其他输出
    # "sticker",     # 表情贴纸
    # "remote_stream",  # 远程流媒体输出
    # "warudo",      # Warudo控制
]

concurrent_rendering = true          # 是否并发渲染到多个Handler
error_handling = "continue"          # 错误处理策略: continue（继续） | stop（停止）
render_timeout = 10.0                # 单个Handler渲染超时（秒），0表示不限制

# ExpressionGenerator配置
[handlers.expression_generator]
default_tts_enabled = true
default_subtitle_enabled = true
default_expressions_enabled = true
default_hotkeys_enabled = true

# --- Subtitle Handler ---
# [handlers.subtitle]
# font_size = 32
# window_width = 1000
# window_height = 720

# --- VTS Handler ---
# [handlers.vts]
# vts_host = "127.0.0.1"
# vts_port = 8000

# --- TTS Handler ---
# [handlers.tts]
# voice = "zh-CN-YunxiNeural"
# rate = "+0%"
# volume = "+0%"

# ========== Dashboard 配置 ==========

[dashboard]
enabled = true
host = "127.0.0.1"
port = 60214
cors_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]
max_history_messages = 1000
websocket_heartbeat = 30
auto_open_browser = true

# ========== 事件总线配置 ==========

[event_bus]
# 是否启用事件数据验证（建议仅 debug 模式开启）
# 开启后会验证所有已注册事件的数据格式
enable_validation = false

# ========== MCP Server 配置 ==========

[mcp]
enabled = false
host = "127.0.0.1"
port = 8021